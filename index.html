<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>My Goal</title>

    <!-- CSS -->

    <link rel="stylesheet" href="css/style.css">

    <link rel="stylesheet" href="css/responsive.css">

</head>

<body>

    <div id="app">

        <!-- ==========================================
             Sidebar
        =========================================== -->

        <aside id="sidebar">

            <div id="sidebar-header"></div>

            <nav id="sidebar-navigation"></nav>

            <div id="sidebar-footer"></div>

        </aside>


        <!-- ==========================================
             Main Content
        =========================================== -->

        <main id="main-content">

            <!-- ======================================
                 Top Header
            ======================================= -->

            <header id="top-header"></header>


            <!-- ======================================
                 Dashboard Page
            ======================================= -->

            <section id="dashboard-page">

                <!-- ==============================
                     Countdown Module
                =============================== -->

                <section id="dashboard-header-section"></section>

                <section id="countdown-section">

                    <div class="countdown-card">

                        <div class="countdown-header">

                            <h2>Scholarship Examination</h2>

                             <p class="exam-date" id="exam-date"></p>

  
                        </div>


                        <div class="countdown-grid">

                            <!-- Days -->

                            <div class="countdown-box">

                                <span class="count-value"
                                      id="days">

                                    000

                                </span>

                                <span class="count-label">

                                    Days

                                </span>

                            </div>


                            <!-- Hours -->

                            <div class="countdown-box">

                                <span class="count-value"
                                      id="hours">

                                    00

                                </span>

                                <span class="count-label">

                                    Hours

                                </span>

                            </div>


                            <!-- Minutes -->

                            <div class="countdown-box">

                                <span class="count-value"
                                      id="minutes">

                                    00

                                </span>

                                <span class="count-label">

                                    Minutes

                                </span>

                            </div>


                            <!-- Seconds -->

                            <div class="countdown-box">

                                <span class="count-value"
                                      id="seconds">

                                    00

                                </span>

                                <span class="count-label">

                                    Seconds

                                </span>

                            </div>

                        </div>


                        <div class="countdown-status">

                            <p id="countdown-message">

                                Stay focused.
                                Every day counts.

                            </p>

                        </div>

                    </div>

                </section>


                <!-- ==============================
                     Daily Score Entry
                =============================== -->

                    <section id="score-entry-section">

    <div class="daily-score-card">

        <div class="daily-score-header">

            <h2>🎯 Today's Score</h2>

            <p>
                Enter today's Grade 5 Scholarship practice score.
            </p>

        </div>

        <div class="daily-score-body">

            <div class="form-group">

                <label for="daily-score-input">
                    Score (0–200)
                </label>

                <input
                    id="daily-score-input"
                    class="score-input"
                    type="number"
                    inputmode="numeric"
                    min="0"
                    max="200"
                    step="1"
                    placeholder="Enter today's score"
                    autocomplete="off">

            </div>

            <div
                id="daily-score-message"
                class="score-message"
                aria-live="polite">
            </div>

            <button
                id="daily-score-save-button"
                class="primary-button"
                type="button">

                Save Today's Score

            </button>

        </div>

        <div class="daily-score-footer">

            <div class="score-info">

                <span>

                    Maximum :
                    <strong id="score-maximum">200</strong>

                </span>

                <span>

                    Target :
                    <strong id="score-target">160</strong>

                </span>

            </div>

        </div>

    </div>

</section>


                <!-- ==============================
                     Statistics
                =============================== -->

                <section id="statistics-section"></section>


                <!-- ==============================
                     Badges
                =============================== -->

                <section id="badge-section"></section>


                <!-- ==============================
                     Improvement
                =============================== -->

                <section id="improvement-section"></section>


                <!-- ==============================
                     Motivation
                =============================== -->

                <section id="motivation-section"></section>


                <!-- ==============================
                     Charts
                =============================== -->

                <section id="chart-section"></section>


                <!-- ==============================
                     History
                =============================== -->

                <section id="history-section"></section>

            </section>


            <!-- ======================================
                 History Page
            ======================================= -->

            <section id="history-page" hidden></section>


            <!-- ======================================
                 Progress Page
            ======================================= -->

            <section id="progress-page" hidden></section>


            <!-- ======================================
                 Motivation Page
            ======================================= -->

            <section id="motivation-page" hidden></section>


            <!-- ======================================
                 Settings Page
            ======================================= -->

            <section id="settings-page" hidden></section>


            <!-- ======================================
                 About Page
            ======================================= -->

            <section id="about-page" hidden></section>

        </main>

    </div>


    <!-- ==========================================
         JavaScript Files
    =========================================== -->

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/student-profile.js"></script>

    <script src="js/countdown.js"></script>
    <script src="js/welcome.js"></script>

    <script src="js/main.js"></script>

</body>

</html>
